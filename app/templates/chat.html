{% extends "base.html" %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/pyodide@0.29.3/pyodide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/loader.min.js"></script>
<script src="{{ url_for('static', filename='js/supabase.js') }}"></script>
<script>
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs' } });
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/editor/editor.main.min.css">

<div style="display: flex; height: calc(100vh - 64px); gap: 8px; padding: 8px; background: #1a1a1a;">
    <!-- LEFT: CHAT -->
    <div style="flex: 7; display: flex; flex-direction: column; background: #252525; border: 1px solid #333; border-radius: 8px;">
        <div style="padding: 12px; border-bottom: 1px solid #333; background: #1a1a1a;">
            <h3 style="margin: 0; font-weight: bold;">💬 {{ repo_name }}</h3>
        </div>
        
        <div style="flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;" id="chat-messages">
            <p id="loading-msg" style="color: #888;">⏳ Carregando...</p>
        </div>
        
        <div style="padding: 16px; border-top: 1px solid #333;">
            <form id="chat-form" style="display: flex; flex-direction: column; gap: 8px;">
                <textarea id="message-input" placeholder="Digite mensagem ou código..." style="width: 100%; padding: 10px; border: 1px solid #333; border-radius: 4px; background: #1a1a1a; color: white; font-family: monospace; resize: vertical; min-height: 50px;"></textarea>
                <button type="submit" style="padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer;">Enviar</button>
            </form>
        </div>
    </div>
</div>

<!-- MODAL: PREVIEW (Inicialmente oculto) -->
<div id="preview-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center;">
    <div style="width: 90%; height: 80%; background: #252525; border: 1px solid #333; border-radius: 8px; display: flex; flex-direction: column;">
        <div style="padding: 12px; border-bottom: 1px solid #333; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; font-weight: bold;">▶ Execução do Código</h3>
            <button onclick="closePreview()" style="padding: 4px 12px; background: #dc3545; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold;">✕ FECHAR</button>
        </div>
        
        <div style="flex: 1; overflow: auto; background: #000; padding: 16px; font-family: monospace; font-size: 13px; color: #0f0;" id="code-preview">
            <p style="color: #666;">⏳ Aguardando execução...</p>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = "{{ config['SUPABASE_URL'] }}";
    const supabaseKey = "{{ config['SUPABASE_ANON_KEY'] }}";
    const client = supabase.createClient(supabaseUrl, supabaseKey);
    const repoName = "{{ repo_name }}";
    const userHandle = "{{ user.user_metadata.user_name }}";
    const userAvatar = "{{ user.user_metadata.avatar_url }}";
    const userId = "{{ user.id }}";
    const editors = {};
    let pyodide;

    function appendMessage(data) {
        const chatBox = document.getElementById('chat-messages');
        const pyMatch = data.content.match(/```python([\s\S]*?)```/);
        const jsMatch = data.content.match(/```javascript([\s\S]*?)```/);
        const htmlMatch = data.content.match(/```html([\s\S]*?)```/);
        
        let lang = null, code = null, text = data.content;
        if (pyMatch) { lang = 'python'; code = pyMatch[1].trim(); text = text.split('```')[0]; }
        if (jsMatch) { lang = 'javascript'; code = jsMatch[1].trim(); text = text.split('```')[0]; }
        if (htmlMatch) { lang = 'html'; code = htmlMatch[1].trim(); text = text.split('```')[0]; }

        const html = `
            <div style="padding: 8px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px;">
                <div style="display: flex; gap: 8px; margin-bottom: 4px;">
                    <img src="${data.user_avatar}" style="width: 32px; height: 32px; border-radius: 50%; cursor: pointer;" onclick="location.href='/profile/${data.user_name}'">
                    <div style="flex: 1;">
                        <p style="margin: 0; font-weight: bold; font-size: 12px; color: #0f0;">@${data.user_name}</p>
                        <p style="margin: 4px 0 0 0; color: #666; font-size: 11px;">${new Date(data.created_at).toLocaleTimeString()}</p>
                    </div>
                </div>
                <p style="margin: 8px 0; white-space: pre-wrap; word-break: break-word;">${text}</p>
                ${lang ? `
                    <div style="margin-top: 8px; background: #000; border: 1px solid #333; border-radius: 4px; overflow: hidden;">
                        <div style="display: flex; justify-content: space-between; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333;">
                            <span style="font-size: 10px; font-weight: bold; color: #0f0;">${lang.toUpperCase()}</span>
                            <button onclick="runCode('editor-msg-${data.id}', '${lang}')" style="padding: 4px 8px; background: #238636; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 11px;">▶ RUN</button>
                        </div>
                        <div id="editor-msg-${data.id}" style="height: 150px; border-bottom: 1px solid #333;"></div>
                    </div>
                ` : ''}
            </div>`;

        const loadingMsg = document.getElementById('loading-msg');
        if (loadingMsg) loadingMsg.remove();
        
        chatBox.insertAdjacentHTML('beforeend', html);
        chatBox.scrollTop = chatBox.scrollHeight;

        // Inicializar Monaco Editor se houver código
        if (lang) {
            setTimeout(() => {
                initMonaco(`editor-msg-${data.id}`, code, lang);
            }, 100);
        }
    }

    function initMonaco(containerId, code, language) {
        require(['vs/editor/editor.main'], function () {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            try {
                editors[containerId] = monaco.editor.create(container, {
                    value: code,
                    language: language,
                    theme: 'vs-dark',
                    automaticLayout: true,
                    minimap: { enabled: false },
                    fontSize: 11,
                    scrollBeyondLastLine: false,
                    wordWrap: 'on'
                });
            } catch (err) {
                console.error(`Monaco erro: ${err}`);
            }
        });
    }

    client.channel('room-main').on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'messages', filter: `room_slug=eq.${repoName}`
    }, payload => appendMessage(payload.new)).subscribe();

    async function loadHistory() {
        const { data } = await client.from('messages').select('*').eq('room_slug', repoName).order('created_at');
        if (data) data.forEach(appendMessage);
    }

    document.getElementById('chat-form').onsubmit = async (e) => {
        e.preventDefault();
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        
        await client.from('messages').insert([{
            room_slug: repoName, user_id: userId, content: text,
            user_name: userHandle, user_avatar: userAvatar
        }]);
    };

    async function runCode(editorId, lang) {
        const editor = editors[editorId];
        if (!editor) {
            console.error(`Editor não encontrado: ${editorId}`);
            return;
        }
        
        const code = editor.getValue();
        const modal = document.getElementById('preview-modal');
        const preview = document.getElementById('code-preview');
        
        // Mostrar o modal
        modal.style.display = 'flex';
        preview.innerHTML = '<p style="color: #666;">⏳ Executando código...</p>';
        preview.style.background = '#000';
        preview.style.color = '#0f0';

        try {
            if (lang === 'python') {
                if (!pyodide) pyodide = await loadPyodide();
                await pyodide.runPythonAsync(`
import sys, io
sys.stdout = io.StringIO()
${code}
result = sys.stdout.getvalue()
`);
                const result = pyodide.globals.get('result');
                preview.innerHTML = `<pre style="margin: 0; white-space: pre-wrap;">${result || '(sem output)'}</pre>`;
                preview.style.background = '#000';
                preview.style.color = '#0f0';
            } else if (lang === 'javascript') {
                let out = '';
                const c = { 
                    log: (x) => out += x + '\n', 
                    error: (x) => out += 'ERROR: ' + x + '\n',
                    warn: (x) => out += 'WARN: ' + x + '\n'
                };
                new Function('console', code)(c);
                preview.innerHTML = `<pre style="margin: 0; white-space: pre-wrap;">${out || '(sem output)'}</pre>`;
                preview.style.background = '#000';
                preview.style.color = '#0f0';
            } else if (lang === 'html') {
                preview.innerHTML = code;
                preview.style.background = '#fff';
                preview.style.color = '#000';
            }
        } catch (err) {
            preview.innerHTML = `<pre style="margin: 0; color: #ff4444;">❌ ERRO:\n${err.message}</pre>`;
            preview.style.background = '#000';
            preview.style.color = '#ff4444';
        }
    }

    function closePreview() {
        document.getElementById('preview-modal').style.display = 'none';
    }

    // Fechar modal ao clicar fora
    document.getElementById('preview-modal').addEventListener('click', (e) => {
        if (e.target.id === 'preview-modal') {
            closePreview();
        }
    });

    loadHistory();
</script>
{% endblock %}
